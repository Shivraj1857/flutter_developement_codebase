name: app_localization
description: Localization package using Flutter intl.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

flutter:
  generate: true
  assets:
    - assets/policy/style.css
    - assets/policy/en/
    - assets/policy/ar/
    - assets/policy/es/
